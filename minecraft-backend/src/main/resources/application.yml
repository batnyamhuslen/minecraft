spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/minecraft
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      # Flyway owns schema creation/validation; Hibernate just uses it.
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080